# Apply this to the EKS cluster (in whatever namespace ArgoCD itself runs in,
# typically argocd) with: kubectl apply -f application-plain-manifests.yaml
#
# Only apply ONE of application-plain-manifests.yaml /
# application-kustomize.yaml - both manage the same "lms" namespace and
# resources, and having both syncing would fight each other.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lms-prod-plain
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/vishnu-mohan-9447/lms-gitops-source.git
    targetRevision: main
    path: plain-manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: lms
  syncPolicy:
    automated:
      prune: true      # remove resources deleted from git
      selfHeal: true    # revert manual kubectl edits back to what's in git
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    # HPA (not git) owns replica count once it's active - without this,
    # selfHeal fights the autoscaler and scales back down to whatever's
    # hardcoded in the Deployment YAML on every reconcile.
    - group: apps
      kind: Deployment
      name: lms-backend
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: Deployment
      name: lms-frontend
      jsonPointers:
        - /spec/replicas
