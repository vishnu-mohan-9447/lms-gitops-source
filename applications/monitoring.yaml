apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd

spec:
  project: default

  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 87.10.1
      helm:
        valueFiles:
          - $values/helm-values/kube-prometheus-stack.yaml

    - repoURL: https://github.com/vishnu-mohan-9447/lms-gitops-source.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      # Required for kube-prometheus-stack: its CRDs (Alertmanager,
      # Prometheus, PrometheusAgent, ThanosRuler) have OpenAPI schemas
      # large enough that client-side apply's
      # kubectl.kubernetes.io/last-applied-configuration annotation
      # exceeds Kubernetes' hard 256KiB annotation limit
      # ("metadata.annotations: Too long"). Server-side apply tracks field
      # ownership server-side instead of stuffing the whole manifest into
      # an annotation, which avoids this entirely. This is the standard,
      # widely-documented fix for this exact chart+ArgoCD combination.
      - ServerSideApply=true
