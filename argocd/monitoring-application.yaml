apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: "25.8.0"
      chart: prometheus
      helm:
        releaseName: prometheus
        valuesObject:
          server:
            persistentVolume:
              enabled: false
    - repoURL: https://grafana.github.io/helm-charts
      targetRevision: "8.5.0"
      chart: grafana
      helm:
        releaseName: grafana
        valuesObject:
          persistence:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
