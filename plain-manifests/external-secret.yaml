apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lms-backend-secret
  namespace: lms
  annotations:
    # PreSync, wave -1: after ClusterSecretStore (-2), before the
    # migration Job (0) which needs the Secret this produces. See
    # argocd-cm's custom health check (wired via Terraform) for why this
    # alone is enough - ArgoCD won't advance to wave 0 until this
    # ExternalSecret actually reports Ready, not just "created".
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: lms-backend-secret 
    creationPolicy: Owner 
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: arn:aws:secretsmanager:us-east-1:981750770657:secret:rds!db-e42409ed-b1f3-44b9-8ffc-866e88127f04-FkwWX6
        property: password

    - secretKey: JWT_SECRET
      remoteRef:
        key: cloudcampus-lms/jwt-secret
