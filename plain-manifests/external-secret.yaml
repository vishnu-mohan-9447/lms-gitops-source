apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lms-backend-secret
  namespace: lms
  annotations:
    # PreSync, wave -1: after ClusterSecretStore (-2), before the
    # migration Job (0) which needs the Secret this produces. See
    # argocd-cm's custom health check (wired via Terraform) for why this
    # alone is enough - ArgoCD won't advance to wave 0 until this
    # ExternalSecret actually reports Ready, not just "created".
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: lms-backend-secret 
    creationPolicy: Owner 
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        # Stable name - Terraform-managed, doesn't change on environment
        # recreation (unlike AWS's auto-generated manage_master_user_password
        # secret, which used to get a new UUID name every rebuild).
        key: cloudcampus-lms/rds-master-password

    - secretKey: JWT_SECRET
      remoteRef:
        key: cloudcampus-lms/jwt-secret
