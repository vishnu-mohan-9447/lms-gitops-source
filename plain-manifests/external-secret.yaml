apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: lms-backend-secret
  namespace: lms
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: lms-backend-secret   # the K8s Secret this creates - same name the
    creationPolicy: Owner       # Deployment's envFrom.secretRef already expects
  data:
    # RDS master password - secret ARN comes from terraform output
    # `rds_master_user_secret_arn`, holds JSON: {"username":"...","password":"..."}
    - secretKey: DB_PASSWORD
      remoteRef:
        key: <PASTE_rds_master_user_secret_arn_HERE>
        property: password

    # JWT signing secret - create this one yourself, it isn't generated by
    # Terraform/RDS:
    #   aws secretsmanager create-secret --name cloudcampus-lms/jwt-secret \
    #     --secret-string "$(openssl rand -hex 32)"
    - secretKey: JWT_SECRET
      remoteRef:
        key: cloudcampus-lms/jwt-secret
