# NOTE (read before applying): committing plaintext-derived Secret manifests
# to git, even a private repo, is a real anti-pattern - anyone with repo
# access (and your full git history) has the credentials forever. For actual
# production use, replace this file with either:
#   - the External Secrets Operator (pulls the RDS master password directly
#     from the Secrets Manager ARN your Terraform already outputs), or
#   - Sealed Secrets (encrypts the value so only the cluster can decrypt it)
#
# For now, to get ArgoCD sync working end-to-end while you're learning, this
# is a plain Secret with placeholder values you fill in by hand - do NOT put
# your real RDS password/JWT secret in this file if this repo will ever be
# pushed anywhere shared. Use `kubectl create secret ... --dry-run=client -o
# yaml` to generate the base64 values locally instead of typing them here.

apiVersion: v1
kind: Secret
metadata:
  name: lms-backend-secret
  namespace: lms
type: Opaque
data:
  DB_PASSWORD: "UkVQTEFDRV9NRQ==" # base64 for "REPLACE_ME"
  JWT_SECRET: "UkVQTEFDRV9NRQ=="  # base64 for "REPLACE_ME"
