apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: lms
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      # No accessKeyID/secretAccessKey here on purpose - auth comes from the
      # IRSA role annotated on the external-secrets ServiceAccount (see
      # terraform output eso_iam_role_arn), not static credentials.
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
