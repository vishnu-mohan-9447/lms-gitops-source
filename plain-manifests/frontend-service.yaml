# Fronted by the nginx-ingress controller (see ingress.yaml) rather than
# provisioning its own separate AWS load balancer.
apiVersion: v1
kind: Service
metadata:
  name: lms-frontend
  namespace: lms
spec:
  selector:
    app: lms-frontend
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
