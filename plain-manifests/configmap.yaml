apiVersion: v1
kind: ConfigMap
metadata:
  name: lms-backend-config
  namespace: lms
data:
  PORT: "5000"
  NODE_ENV: "production"
  # Fill in with the RDS "db_address" output from terraform/prod-eks
  DB_HOST: "REPLACE_WITH_RDS_ADDRESS"
  DB_PORT: "5432"
  DB_NAME: "lms_db"
  DB_USER: "lms_user"
  JWT_EXPIRES_IN: "8h"
  CORS_ORIGIN: "*"
