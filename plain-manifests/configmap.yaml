apiVersion: v1
kind: ConfigMap
metadata:
  name: lms-backend-config
  namespace: lms
  annotations:
    # PreSync hook, earliest wave - this has no dependencies of its own,
    # and both the ExternalSecret's Secret (wave -1) and the migration Job
    # (wave 0) need it to exist first.
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-2"
data:
  PORT: "5000"
  NODE_ENV: "production"
  # Fill in with the RDS "db_address" output from terraform/prod-eks
  DB_HOST: "cloudcampus-lms-prod-db.ckzw8amc2gwv.us-east-1.rds.amazonaws.com"
  DB_PORT: "5432"
  DB_NAME: "lms_db"
  DB_USER: "lms_user"
  JWT_EXPIRES_IN: "8h"
  CORS_ORIGIN: "*"
