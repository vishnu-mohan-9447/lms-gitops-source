apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms-backend
  namespace: lms
  labels:
    app: lms-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lms-backend
  template:
    metadata:
      labels:
        app: lms-backend
    spec:
      containers:
        - name: lms-backend
          # Jenkins rewrites this exact line during the "Update GitOps repo"
          # stage - keep the image tag on its own line so `sed` can target it.
          image: vishnumohan9447/lms-backend:4
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: lms-backend-config
            - secretRef:
                name: lms-backend-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
