loki:
  useTestSchema: true

  auth_enabled: false

  # NOTE: `loki.persistence.enabled` (as this file previously had it) is not
  # a real setting for SingleBinary deployment mode - the chart silently
  # ignores it. The actual toggle is `singleBinary.persistence` below.

  resources:
    requests:
      cpu: 100m
      memory: 300Mi
    limits:
      cpu: 200m
      memory: 600Mi

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: gp3 # created by Terraform (kubernetes_storage_class_v1.gp3)
    size: 10Gi

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

# The chart enables these by default even without explicit config here.
# They're optional performance add-ons, not required for Loki to work:
#   - chunksCache/resultsCache: memcached-backed query caches, useful at
#     higher query volume than this project has
#   - lokiCanary: Grafana Labs' own synthetic write/read health-check tool,
#     diagnostic only, not part of the actual log pipeline
# All three were causing scheduling failures (memory pressure / pod-count
# ceiling / a NodeAffinity mismatch) without adding real value at this
# scale - disabled rather than solved by adding yet more node capacity.
chunksCache:
  enabled: false

resultsCache:
  enabled: false

lokiCanary:
  enabled: false
