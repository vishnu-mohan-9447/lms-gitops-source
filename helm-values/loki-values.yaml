loki:
  useTestSchema: true

  auth_enabled: false

  # NOTE: `loki.persistence.enabled` (as this file previously had it) is not
  # a real setting for SingleBinary deployment mode - the chart silently
  # ignores it. The actual toggle is `singleBinary.persistence` below.

  resources:
    requests:
      cpu: 100m
      memory: 300Mi
    limits:
      cpu: 200m
      memory: 600Mi

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: gp3 # created by Terraform (kubernetes_storage_class_v1.gp3)
    size: 10Gi

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

# The chart enables these by default even without explicit config here.
# chunksCache/resultsCache are optional memcached-backed query caches,
# useful at higher query volume than this project has - safe to disable.
#
# lokiCanary CANNOT be disabled on its own with this chart version: the
# chart's own templates/validate.yaml hard-fails template rendering
# entirely ("Helm test requires the Loki Canary to be enabled") if it's
# off, which blocks ArgoCD from generating manifests for anything in this
# Application, not just the canary. Left enabled; its earlier NodeAffinity
# scheduling issue should resolve on its own now that there are 4 nodes
# instead of 2 - recheck with `kubectl get pods -n monitoring | grep canary`
# after this syncs and only chase it further if a pod is still stuck.
chunksCache:
  enabled: false

resultsCache:
  enabled: false
