grafana:
  enabled: true

  # No adminPassword set on purpose - the chart auto-generates a random
  # one into a Secret if omitted, same pattern as ArgoCD's own initial
  # admin password. Retrieve it with:
  #   kubectl get secret -n monitoring monitoring-grafana \
  #     -o jsonpath='{.data.admin-password}' | base64 -d

  persistence:
    enabled: false

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.cokonet.local   # placeholder - swap for your real domain once you have one, same pattern as the argocd/lms Ingresses

prometheus:
  prometheusSpec:
    retention: 7d

    storageSpec: {}

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

alertmanager:
  enabled: true

  alertmanagerSpec:
    storage: {}

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true
